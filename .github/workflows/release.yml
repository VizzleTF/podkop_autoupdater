name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: amd64
            goarch: amd64
            extra_env: ""
          - target: arm64
            goarch: arm64
            extra_env: ""
          - target: armv7
            goarch: arm
            extra_env: "GOARM=7"
          - target: mipsle
            goarch: mipsle
            extra_env: "GOMIPS=softfloat"
          - target: mips
            goarch: mips
            extra_env: "GOMIPS=softfloat"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build
        working-directory: go
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          eval "${{ matrix.extra_env }}"
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-dev}" \
            -o dist/podkop_updater-${{ matrix.target }} \
            ./cmd/podkop_updater

      - name: UPX compress (in place)
        working-directory: go
        run: |
          if upx --best --lzma dist/podkop_updater-${{ matrix.target }}; then
            echo "compressed OK"
          else
            echo "upx failed, shipping uncompressed"
          fi
          ls -lh dist/

      - name: Checksum (post-UPX, the distributed artifact)
        working-directory: go/dist
        run: |
          sha256sum podkop_updater-${{ matrix.target }} > podkop_updater-${{ matrix.target }}.sha256
          cat podkop_updater-${{ matrix.target }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: podkop_updater-${{ matrix.target }}
          path: |
            go/dist/podkop_updater-${{ matrix.target }}
            go/dist/podkop_updater-${{ matrix.target }}.sha256

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
